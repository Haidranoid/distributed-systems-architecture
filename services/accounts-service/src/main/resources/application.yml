server:
  port: 8081
spring:
  application:
    name: accounts-service
  config:
    import: ${CONFIG_IMPORT:}
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
management:
  endpoints:
    web:
      exposure:
        include: health, info
logging:
  level:
    # Kafka
    org.apache.kafka.common.config.AbstractConfig: WARN
    org.apache.kafka.common.utils.AppInfoParser: WARN
    org.apache.kafka.clients.producer.KafkaProducer: WARN

    # Hibernate
    org.hibernate.orm.connections.pooling: WARN

    # MVC
    org.springframework.web.servlet.DispatcherServlet: WARN

    # SpringDoc
    org.springdoc.core.events.SpringDocAppInitializer: ERROR
application:
  security:
    jwt:
      algorithm: RS256
      public-key: 
      issuer: ${spring.application.name}