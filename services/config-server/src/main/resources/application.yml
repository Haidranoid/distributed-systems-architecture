server:
  port: 8888
spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/Haidranoid/distributed-systems-architecture-properties.git
          default-label: master
          clone-on-start: false
          #skipSslValidation: true
management:
  endpoints:
    web:
      exposure:
        include: health, info
logging:
  level:
    # MVC
    org.springframework.web.servlet.DispatcherServlet: WARN