server:
  port: 8082
spring:
  application:
    name: audit-service
  kafka:
    consumer:
      group-id: audit-service
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: org.dsa.core.sharedstarter.messaging.events
      #  spring.json.trusted.packages: "*"
      #  spring.json.value.default.type: org.dsa.services.auditservice.messaging.events.AccountCreatedEvent
      #  spring.json.use.type.headers: false
  config:
    import: ${CONFIG_IMPORT:}
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
management:
  endpoints:
    web:
      exposure:
        include: health, info
logging:
  level:
    # Kafka
    org.apache.kafka.common.config.AbstractConfig: WARN
    org.apache.kafka.common.utils.AppInfoParser: WARN
    org.apache.kafka.clients.producer.KafkaProducer: WARN

    # Hibernate
    org.hibernate.orm.connections.pooling: WARN

    # MVC
    org.springframework.web.servlet.DispatcherServlet: WARN
application:
  security:
    jwt:
      algorithm: RS256
      public-key: 
      issuer: ${spring.application.name}