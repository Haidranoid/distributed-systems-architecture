include:
  - local: '/infra/ci/gitlab/templates/images/gateway/test.yml'
  - local: '/infra/ci/gitlab/templates/images/gateway/publish.yml'

default:
  tags:
    - local

variables:
  SERVICE_NAME: "gateway"
  SERVICE_DIR: "/services/gateway"
  SERVICE_DIR_TEST: "$SERVICE_DIR/$SERVICE_NAME"
  SERVICE_DIR_TEST_2: $SERVICE_DIR/$SERVICE_NAME
  GRADLE_USER_HOME: "/services/gateway/.gradle"

stages:
  - test
  - publish