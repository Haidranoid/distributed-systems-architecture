server:
  port: 8222
spring:
  application:
    name: gateway
  config:
    import: optional:configserver:http://config-server-srv:8888
    fail-fast: true
    retry:
      initial-interval: 2000
      max-attempts: 10
      max-interval: 5000
  threads:
    virtual:
      enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health, info
application:
  security:
    jwt:
      issuer: ${spring.application.name}