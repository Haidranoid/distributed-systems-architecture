server:
  port: 8222
spring:
  application:
    name: gateway
  config:
    import: optional:configserver:http://config-server:8888
  threads:
    virtual:
      enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health, info
application:
  security:
    jwt:
      issuer: ${spring.application.name}