spring:
  cloud:
    config:
      enabled: false
    gateway:
      server:
        webmvc:
          routes:
            - id: authentication-service
              uri: http://localhost:8080
              predicates:
                - Path=/api/v1/auth/**

            - id: accounts-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/accounts/**

            - id: audit-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/audit/**

            - id: media-generation-service
              uri: http://localhost:8080
              predicates:
                - Path=/api/v1/media-generation/**

            - id: content-service
              uri: http://localhost:8080
              predicates:
                - Path=/api/v1/content/**