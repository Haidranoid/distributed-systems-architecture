spring:
  cloud:
    config:
      enabled: false
    gateway:
      server:
        webmvc:
          routes:
            - id: authentication-service
              uri: http://localhost:8080
              predicates:
                - Path=/api/v1/auth/**
            - id: accounts-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/accounts/**