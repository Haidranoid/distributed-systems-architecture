spring:
  cloud:
    config:
      enabled: false
    gateway:
      server:
        webmvc:
          routes:
            - id: authentication-service
              uri: http://host.docker.internal:8081
              predicates:
                - Path=/api/v1/authentication/**

            - id: accounts-service
              uri: http://host.docker.internal:8082
              predicates:
                - Path=/api/v1/accounts/**

            - id: audit-service
              uri: http://host.docker.internal:8083
              predicates:
                - Path=/api/v1/audit/**

            - id: media-generation-service
              uri: http://host.docker.internal:8084
              predicates:
                - Path=/api/v1/media-generation/**

            - id: content-service
              uri: http://host.docker.internal:8085
              predicates:
                - Path=/api/v1/content/**