server:
  port: 8222
spring:
  application:
    name: gateway
  config:
    import: ${CONFIG_IMPORT:}
    fail-fast: true
    retry:
      initial-interval: 2000
      max-attempts: 10
      max-interval: 5000
  threads:
    virtual:
      enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health, info
logging:
  level:
    # Kafka
    org.apache.kafka.common.config.AbstractConfig: WARN
    org.apache.kafka.common.utils.AppInfoParser: WARN
    org.apache.kafka.clients.producer.KafkaProducer: WARN

    # MVC
    org.springframework.web.servlet.DispatcherServlet: WARN
application:
  security:
    jwt:
      issuer: authentication-service
      algorithm: RS256
      public-key: 