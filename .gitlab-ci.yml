variables:
  GIT_DEPTH: 0

  GRADLE_USER_HOME: /cache/gradle/$PROJECT_NAME
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.parallel=true
    -Dorg.gradle.caching=true

  INFRA_DIR: infra
  ARTIFACTS_DIR: artifacts
  SERVICES_DIR: services

  GITLAB_DIR: infra/ci
  GITLAB_TEMPLATES_DIR: infra/ci/templates

  ARTIFACT_TYPE_JAVA: java
  ARTIFACT_TYPE_NET: net

  SERVICE_TYPE_JAVA: java
  SERVICE_TYPE_NET: net

workflow:
  rules:
    # Merge Requests
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      # Default branch (master/main)
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    # Everything else -> no pipeline
    - when: never

stages:
  - artifacts
  - services

# trigger template
.trigger-template:
  trigger:
    strategy: depend

    include:
      - local: $PROJECT_DIR/.gitlab-ci.yml
      - local: $GITLAB_DIR/bootstrap/setup-env.yml

  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - $PROJECT_DIR/**/*
        - $GITLAB_TEMPLATES_DIR/$PROJECT_DIR/**/*

# artifacts
trigger-shared-starter:
  extends: .trigger-template
  stage: artifacts

  variables:
    PROJECT_NAME: shared-starter
    PROJECT_TYPE: $ARTIFACTS_DIR/$ARTIFACT_TYPE_JAVA
    PROJECT_DIR: $ARTIFACTS_DIR/$ARTIFACT_TYPE_JAVA/$PROJECT_NAME

# services
trigger-config-server:
  extends: .trigger-template
  stage: services

  variables:
    PROJECT_NAME: config-server
    PROJECT_TYPE: $SERVICES_DIR/$SERVICE_TYPE_JAVA
    PROJECT_DIR: $SERVICES_DIR/$PROJECT_NAME
    #PROJECT_DIR: $SERVICES_DIR/$SERVICE_TYPE_JAVA/$PROJECT_NAME

trigger-authentication-service:
  extends: .trigger-template
  stage: services

  variables:
    PROJECT_NAME: authentication-service
    PROJECT_TYPE: $SERVICES_DIR/$SERVICE_TYPE_JAVA
    PROJECT_DIR: $SERVICES_DIR/$PROJECT_NAME
    #PROJECT_DIR: $SERVICES_DIR/$SERVICE_TYPE_JAVA/$PROJECT_NAME
    
trigger-accounts-service:
  extends: .trigger-template
  stage: services

  variables:
    PROJECT_NAME: accounts-service
    PROJECT_TYPE: $SERVICES_DIR/$SERVICE_TYPE_JAVA
    PROJECT_DIR: $SERVICES_DIR/$PROJECT_NAME
    #PROJECT_DIR: $SERVICES_DIR/$SERVICE_TYPE_JAVA/$PROJECT_NAME

trigger-audit-service:
  extends: .trigger-template
  stage: services

  variables:
    PROJECT_NAME: audit-service
    PROJECT_TYPE: $SERVICES_DIR/$SERVICE_TYPE_JAVA
    PROJECT_DIR: $SERVICES_DIR/$PROJECT_NAME
    #PROJECT_DIR: $SERVICES_DIR/$SERVICE_TYPE_JAVA/$PROJECT_NAME

trigger-gateway:
  extends: .trigger-template
  stage: services

  variables:
    PROJECT_NAME: gateway
    PROJECT_TYPE: $SERVICES_DIR/$SERVICE_TYPE_JAVA
    PROJECT_DIR: $SERVICES_DIR/$PROJECT_NAME
    #PROJECT_DIR: $SERVICES_DIR/$SERVICE_TYPE_JAVA/$PROJECT_NAME