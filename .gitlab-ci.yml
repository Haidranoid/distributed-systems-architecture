variables:
  GIT_DEPTH: 0
  INFRA_DIR: /infra
  ARTIFACTS_DIR: /artifacts
  SERVICES_DIR: /services

trigger-shared-starter-workflow:
  variables:
    PROJECT_NAME: shared-starter
    PROJECT_DIR: $ARTIFACTS_DIR/$PROJECT_NAME
  trigger:
    include:
      - local: '/$PROJECT_DIR/.gitlab-ci.yml'
  rules:
    - if: "$CI_COMMIT_BRANCH == 'master'"
      changes:
        - artifacts/shared-starter/**/*
        - infra/ci/gitlab/templates/artifacts/shared-starter/**/*

trigger-config-server-workflow:
  trigger:
    include:
      - local: '/services/config-server/.gitlab-ci.yml'
  rules:
    - if: "$CI_COMMIT_BRANCH == 'master'"
      changes:
        - services/config-server/**/*
        - infra/ci/gitlab/templates/images/config-server/**/*

