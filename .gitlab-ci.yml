variables:
  GIT_DEPTH: 0

  GRADLE_USER_HOME: /cache/gradle/$PROJECT_NAME
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.parallel=true
    -Dorg.gradle.caching=true

  INFRA_DIR: infra
  ARTIFACTS_DIR: artifacts
  SERVICES_DIR: services

  GITLAB_DIR: infra/ci/gitlab
  GITLAB_TEMPLATES_DIR: infra/ci/gitlab/templates

workflow:
  rules:
      # Merge Requests
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      # Default branch (master/main)
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    # Everything else -> no pipeline
    - when: never

stages:
  - artifacts
  - services

# trigger template
.trigger-template:
  trigger:
    strategy: depend

    include:
      - local: $PROJECT_DIR/.gitlab-ci.yml
      - local: $GITLAB_DIR/setup-env.yml

  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - $PROJECT_DIR/**/*
        - $GITLAB_TEMPLATES_DIR/$PROJECT_DIR/**/*

# artifacts
trigger-shared-starter:
  extends: .trigger-template
  stage: artifacts

  trigger:
    include: 
      - local: $GITLAB_TEMPLATES_DIR/artifacts/test.yml
      - local: $GITLAB_TEMPLATES_DIR/artifacts/publish.yml

  variables:
    PROJECT_NAME: shared-starter
    PROJECT_DIR: $ARTIFACTS_DIR/$PROJECT_NAME

# services
trigger-config-server:
  extends: .trigger-template
  stage: services

  trigger:
    include:
      - local: $GITLAB_TEMPLATES_DIR/services/test.yml
      - local: $GITLAB_TEMPLATES_DIR/services/publish.yml
      - local: $GITLAB_TEMPLATES_DIR/services/deploy.yml

  variables:
    PROJECT_NAME: config-server
    PROJECT_DIR: $SERVICES_DIR/$PROJECT_NAME

trigger-accounts-service:
  extends: .trigger-template
  stage: services

  trigger:
    include:
      - local: $GITLAB_TEMPLATES_DIR/services/test.yml
      - local: $GITLAB_TEMPLATES_DIR/services/publish.yml
      - local: $GITLAB_TEMPLATES_DIR/services/deploy.yml

  variables:
    PROJECT_NAME: accounts-service
    PROJECT_DIR: $SERVICES_DIR/$PROJECT_NAME

trigger-authentication-service:
  extends: .trigger-template
  stage: services

  trigger:
    include:
      - local: $GITLAB_TEMPLATES_DIR/services/test.yml
      - local: $GITLAB_TEMPLATES_DIR/services/publish.yml
      - local: $GITLAB_TEMPLATES_DIR/services/deploy.yml

  variables:
    PROJECT_NAME: authentication-service
    PROJECT_DIR: $SERVICES_DIR/$PROJECT_NAME

trigger-gateway:
  extends: .trigger-template
  stage: services

  trigger:
    include:
      - local: $GITLAB_TEMPLATES_DIR/services/test.yml
      - local: $GITLAB_TEMPLATES_DIR/services/publish.yml
      - local: $GITLAB_TEMPLATES_DIR/services/deploy.yml

  variables:
    PROJECT_NAME: gateway
    PROJECT_DIR: $SERVICES_DIR/$PROJECT_NAME