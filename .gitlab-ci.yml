variables:
  GIT_DEPTH: 0

  GRADLE_USER_HOME: /cache/gradle/$PROJECT_NAME
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.parallel=true
    -Dorg.gradle.caching=true

  INFRASTRUCTURE_DIR: infrastructure
  ARTIFACTS_DIR: artifacts
  
  LIBRARIES_DIR: artifacts/libraries
  MICROSERVICES_DIR: artifacts/microservices

  GITLAB_DIR: infrastructure/gitlab-ci
  GITLAB_TEMPLATES_DIR: infrastructure/gitlab-ci/templates

  LIBRARY_TYPE_JAVA: java
  LIBRARY_TYPE_DOTNET: dotnet-core

  MICROSERVICE_TYPE_JAVA: java
  MICROSERVICE_TYPE_DOTNET: dotnet-core

workflow:
  rules:
    # Merge Requests
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      # Default branch (master/main)
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    # Everything else -> no pipeline
    - when: never

stages:
  - libraries
  - microservices


# trigger templates
.trigger-template-java:
  trigger:
    strategy: depend

    include:
      - local: $PROJECT_DIR/.gitlab-ci.yml
      - local: $GITLAB_DIR/bootstrap/java/setup-env.yml

  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - $PROJECT_DIR/**/*
        - $PROJECT_TEMPLATES_DIR/**/*

.trigger-template-dotnet:
  trigger:
    strategy: depend

    include:
      - local: $PROJECT_DIR/.gitlab-ci.yml
      - local: $GITLAB_DIR/bootstrap/dotnet/setup-env.yml

  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - $PROJECT_DIR/**/*
        - $PROJECT_TEMPLATES_DIR/**/*


# libraries
trigger-shared-starter:
  extends: .trigger-template-java
  stage: libraries

  variables:
    PROJECT_NAME: shared-starter
    PROJECT_DIR: $LIBRARIES_DIR/$LIBRARY_TYPE_JAVA/$PROJECT_NAME
    PROJECT_TEMPLATES_DIR: $GITLAB_TEMPLATES_DIR/libraries/$LIBRARY_TYPE_JAVA


# microservices
trigger-config-server:
  extends: .trigger-template-java
  stage: microservices

  variables:
    PROJECT_NAME: config-server
    PROJECT_TYPE: $MICROSERVICE_TYPE_JAVA
    PROJECT_DIR: $MICROSERVICES_DIR/$PROJECT_TYPE/$PROJECT_NAME
    PROJECT_TEMPLATES_DIR: $GITLAB_TEMPLATES_DIR/microservices/$PROJECT_TYPE

trigger-gateway:
  extends: .trigger-template-java
  stage: microservices

  variables:
    PROJECT_NAME: gateway
    PROJECT_TYPE: $MICROSERVICES_DIR/$MICROSERVICE_TYPE_JAVA
    PROJECT_DIR: $MICROSERVICES_DIR/$PROJECT_NAME

trigger-authentication-service:
  extends: .trigger-template-java
  stage: microservices

  variables:
    PROJECT_NAME: authentication-service
    PROJECT_TYPE: $MICROSERVICE_TYPE_JAVA
    PROJECT_DIR: $MICROSERVICES_DIR/$PROJECT_TYPE/$PROJECT_NAME
    PROJECT_TEMPLATES_DIR: $GITLAB_TEMPLATES_DIR/microservices/$PROJECT_TYPE

trigger-accounts-service:
  extends: .trigger-template-java
  stage: microservices

  variables:
    PROJECT_NAME: accounts-service
    PROJECT_TYPE: $MICROSERVICE_TYPE_JAVA
    PROJECT_DIR: $MICROSERVICES_DIR/$PROJECT_TYPE/$PROJECT_NAME
    PROJECT_TEMPLATES_DIR: $GITLAB_TEMPLATES_DIR/microservices/$PROJECT_TYPE

trigger-audit-service:
  extends: .trigger-template-java
  stage: microservices

  variables:
    PROJECT_NAME: audit-service
    PROJECT_TYPE: $MICROSERVICE_TYPE_JAVA
    PROJECT_DIR: $MICROSERVICES_DIR/$PROJECT_TYPE/$PROJECT_NAME
    PROJECT_TEMPLATES_DIR: $GITLAB_TEMPLATES_DIR/microservices/$PROJECT_TYPE

trigger-media-generation-service:
  extends: .trigger-template-dotnet
  stage: microservices

  variables:
    PROJECT_NAME: MediaGenerationService
    PROJECT_NAME_SOLUTION: MediaGenerationService
    PROJECT_TYPE: $MICROSERVICE_TYPE_DOTNET
    PROJECT_DIR: $MICROSERVICES_DIR/$PROJECT_TYPE/$PROJECT_NAME
    PROJECT_TEMPLATES_DIR: $GITLAB_TEMPLATES_DIR/microservices/$PROJECT_TYPE

trigger-content-service:
  extends: .trigger-template-dotnet
  stage: microservices

  variables:
    PROJECT_NAME: ContentService
    PROJECT_NAME_SOLUTION: ContentService
    PROJECT_TYPE: $MICROSERVICE_TYPE_DOTNET
    PROJECT_DIR: $MICROSERVICES_DIR/$PROJECT_TYPE/$PROJECT_NAME
    PROJECT_TEMPLATES_DIR: $GITLAB_TEMPLATES_DIR/microservices/$PROJECT_TYPE
    