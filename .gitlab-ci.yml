variables:
  GIT_DEPTH: 0

  GRADLE_USER_HOME: /cache/gradle/$PROJECT_NAME
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.parallel=true
    -Dorg.gradle.caching=true

  INFRA_DIR: infra
  ARTIFACTS_DIR: artifacts
  SERVICES_DIR: services

  GITLAB_DIR: infra/ci
  GITLAB_TEMPLATES_DIR: infra/ci/templates

  ARTIFACT_TYPE_JAVA: java
  ARTIFACT_TYPE_DOTNET: dotnet

  SERVICE_TYPE_SPRING_BOOT: spring-boot
  SERVICE_TYPE_ASP_DOTNET_NET: asp-dotnet-core

workflow:
  rules:
    # Merge Requests
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      # Default branch (master/main)
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    # Everything else -> no pipeline
    - when: never

stages:
  - artifacts
  - services


# trigger templates
.trigger-template-java:
  trigger:
    strategy: depend

    include:
      - local: $PROJECT_DIR/.gitlab-ci.yml
      - local: $GITLAB_DIR/bootstrap/java/setup-env.yml

  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - $PROJECT_DIR/**/*
        - $GITLAB_TEMPLATES_DIR/$PROJECT_DIR/**/*

.trigger-template-dotnet:
  trigger:
    strategy: depend

    include:
      - local: $PROJECT_DIR/.gitlab-ci.yml
      - local: $GITLAB_DIR/bootstrap/dotnet/setup-env.yml

  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - $PROJECT_DIR/**/*
        - $GITLAB_TEMPLATES_DIR/$PROJECT_DIR/**/*


# artifacts
trigger-shared-starter:
  extends: .trigger-template-java
  stage: artifacts

  variables:
    PROJECT_NAME: shared-starter
    PROJECT_TYPE: $ARTIFACTS_DIR/$ARTIFACT_TYPE_JAVA
    PROJECT_DIR: $ARTIFACTS_DIR/$ARTIFACT_TYPE_JAVA/$PROJECT_NAME


# services
trigger-config-server:
  extends: .trigger-template-java
  stage: services

  variables:
    PROJECT_NAME: config-server
    PROJECT_TYPE: $SERVICES_DIR/$SERVICE_TYPE_SPRING_BOOT
    PROJECT_DIR: $SERVICES_DIR/$PROJECT_NAME

trigger-gateway:
  extends: .trigger-template-java
  stage: services

  variables:
    PROJECT_NAME: gateway
    PROJECT_TYPE: $SERVICES_DIR/$SERVICE_TYPE_SPRING_BOOT
    PROJECT_DIR: $SERVICES_DIR/$PROJECT_NAME

trigger-authentication-service:
  extends: .trigger-template-java
  stage: services

  variables:
    PROJECT_NAME: authentication-service
    PROJECT_TYPE: $SERVICES_DIR/$SERVICE_TYPE_SPRING_BOOT
    PROJECT_DIR: $SERVICES_DIR/$PROJECT_NAME

trigger-accounts-service:
  extends: .trigger-template-java
  stage: services

  variables:
    PROJECT_NAME: accounts-service
    PROJECT_TYPE: $SERVICES_DIR/$SERVICE_TYPE_SPRING_BOOT
    PROJECT_DIR: $SERVICES_DIR/$PROJECT_NAME

trigger-audit-service:
  extends: .trigger-template-java
  stage: services

  variables:
    PROJECT_NAME: audit-service
    PROJECT_TYPE: $SERVICES_DIR/$SERVICE_TYPE_SPRING_BOOT
    PROJECT_DIR: $SERVICES_DIR/$PROJECT_NAME

trigger-media-generation-service:
  extends: .trigger-template-dotnet
  stage: services

  variables:
    PROJECT_NAME: media-generation-service
    PROJECT_NAME_SOLUTION: MediaGenerationService
    PROJECT_TYPE: $SERVICES_DIR/$SERVICE_TYPE_ASP_DOTNET_NET
    PROJECT_DIR: $SERVICES_DIR/$PROJECT_NAME

trigger-content-service:
  extends: .trigger-template-dotnet
  stage: services

  variables:
    PROJECT_NAME: content-service
    PROJECT_NAME_SOLUTION: ContentService
    PROJECT_TYPE: $SERVICES_DIR/$SERVICE_TYPE_ASP_DOTNET_NET
    PROJECT_DIR: $SERVICES_DIR/$PROJECT_NAME
    