trigger-shared-starter-workflow:
  tags:
    - local
  trigger:
    include:
      - local: '/artifacts/shared-starter/.gitlab-ci.yml'
  rules:
    - if: "$CI_COMMIT_BRANCH == 'master'"
      changes:
        - artifacts/shared-starter/**/*
        - infra/ci/**/*

trigger-config-server-workflow:
  tags:
    - local
  trigger:
    include:
      - local: '/services/config-server/.gitlab-ci.yml'
  rules:
    - if: "$CI_COMMIT_BRANCH == 'master'"
      changes:
        - services/config-server/**/*
        - infra/ci/**/*

variables:
  GIT_DEPTH: 0