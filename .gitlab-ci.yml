trigger-shared-starter-workflow:
  trigger:
    include:
      - local: '/artifacts/shared-starter/.gitlab-ci.yml'
  rules:
    - if: "$CI_COMMIT_BRANCH == 'master'"
      changes:
        - artifacts/shared-starter/**/*
        - infra/ci/**/*

