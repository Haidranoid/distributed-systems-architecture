apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: gateway
          imagePullPolicy: Never
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: dev-k8s-configmap
                  key: SPRING_PROFILES_ACTIVE