namespace: dev-k8s

resources:
  - namespace.yml
  - configmap.yml
  - ../../base

images:
  - name: config-server
    newName: dsa/config-server
    newTag: latest

  - name: accounts-service
    newName: dsa/accounts-service
    newTag: latest

  - name: authentication-service
    newName: dsa/authentication-service
    newTag: latest

  - name: gateway
    newName: dsa/gateway
    newTag: latest


patches:
  - path: accounts-service/deployment-patch.yml
  - path: authentication-service/deployment-patch.yml
  - path: config-server/deployment-patch.yml
  - path: gateway/deployment-patch.yml

  #- path: gateway/service-patch.yml

