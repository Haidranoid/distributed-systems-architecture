apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentication-service
spec:
  replicas: 1
  template:
    spec:
      imagePullSecrets:
        - name: ecr-credentials
      containers:
        - name: authentication-service
          image: ${PROJECT_IMAGE_ECR_TAG}:latest
          imagePullPolicy: Always
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: k8s-local-configmap
                  key: SPRING_PROFILES_ACTIVE