variables:
  PROJECT_RELATIVE_PATH_DIR: $CI_PROJECT_DIR/$PROJECT_DIR

  PROJECT_IMAGE_TAG: $ECR_TAG_PREFIX/$PROJECT_NAME
  PROJECT_IMAGE_ECR_TAG: $AWS_ECR_REPOSITORY_URL/$PROJECT_IMAGE_TAG

  GRADLE_USER_HOME: /cache/gradle/$PROJECT_NAME
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.parallel=true
    -Dorg.gradle.caching=true

default:
  image:
    name: haidranoid/gitlab-ci-java21:latest
    pull_policy: if-not-present

  before_script:
    - cd infra/scripts
    - . env.sh

    - echo "Authenticate aws credentials"
    - . $AWS_SCRIPTS_DIR/utils.sh
    - setup_aws_env v1

    - echo "AWS_ECR_REPOSITORY_URL=$AWS_ECR_REPOSITORY_URL" >> .aws.env
    - echo "AWS_ECR_AUTH_PASSWORD=$AWS_ECR_AUTH_PASSWORD" >> .aws.env
    - echo "AWS_CODEARTIFACT_AUTH_TOKEN=$AWS_CODEARTIFACT_AUTH_TOKEN" >> .aws.env

    - echo "ECR_TAG_PREFIX=$ECR_TAG_PREFIX" >> .env

    - cd ../../

  artifacts:
    reports:
      dotenv:
        - $PROJECT_RELATIVE_PATH_DIR/.env
        - $PROJECT_RELATIVE_PATH_DIR/.aws.env