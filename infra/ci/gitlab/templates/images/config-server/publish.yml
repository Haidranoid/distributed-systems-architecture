include:
  - local: '/infra/ci/gitlab/templates/setup-env.yml'

config-server-publish-image:
  stage: publish
  needs:
    - job: config-server-test
      artifacts: true

  script:
    - cd $CONFIG_SERVER_DIR

    - echo $AWS_ECR_AUTH_PASSWORD | docker login --username AWS --password-stdin $AWS_ECR_REPOSITORY_URL

    - docker build --build-arg CODEARTIFACT_AUTH_TOKEN=$AWS_CODEARTIFACT_AUTH_TOKEN -t $PROJECT_IMAGE_TAG .

    - docker tag $PROJECT_IMAGE_TAG:latest $PROJECT_IMAGE_ECR_TAG:latest

    - docker push $PROJECT_IMAGE_ECR_TAG:latest

    - echo "PROJECT_IMAGE_ECR_TAG=$PROJECT_IMAGE_ECR_TAG" >> image.env

  artifacts:
    reports:
      dotenv: $PROJECT_RELATIVE_PATH_DIR/image.env