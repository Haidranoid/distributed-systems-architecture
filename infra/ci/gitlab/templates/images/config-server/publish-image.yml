include:
  - local: '/infra/ci/gitlab/templates/setup-env.yml'
  - local: '/infra/ci/gitlab/templates/stages-rules.yml'

config-server-publish-image:
  stage: publish-image
  extends:
    - .setup-gradle
  needs:
    - job: config-server-test
  variables:
    SERVICE_NAME: config-server
  image:
    name: haidranoid/gitlab-ci-java21:latest
    pull_policy: if-not-present

  script:
    - export IMAGE_TAG=$ECR_TAG_PREFIX/$SERVICE_NAME
    - export IMAGE_ECR_TAG=$AWS_ECR_REPOSITORY_URL/$IMAGE_TAG

    - cd $CONFIG_SERVER_DIR

    - echo $AWS_ECR_AUTH_PASSWORD | docker login --username AWS --password-stdin $AWS_ECR_REPOSITORY_URL

    - docker build -t $IMAGE_TAG .

    - docker tag $IMAGE_TAG:latest $IMAGE_ECR_TAG:latest

    - docker push $IMAGE_ECR_TAG:latest

    - echo "IMAGE_ECR_TAG=$IMAGE_ECR_TAG" >> image.env

  artifacts:
    reports:
      dotenv: image.env