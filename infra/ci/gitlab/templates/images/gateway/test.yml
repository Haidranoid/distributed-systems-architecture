include:
  - local: '/infra/ci/gitlab/templates/setup-env.yml'

gateway-test:
  stage: test
  variables:
    GRADLE_USER_HOME: "$CI_PROJECT_DIR/services/gateway/.gradle"
  extends:
    - .setup-gradle
    - .setup-credentials
    - .setup-image

  script:
    - cd $GATEWAY_DIR
    - chmod +x ./gradlew
    - ./gradlew test --build-cache --parallel

  artifacts:
    when: always
    paths:
      - services/gateway/build/reports/tests/test
    reports:
      junit:
        - services/gateway/build/test-results/test/*.xml