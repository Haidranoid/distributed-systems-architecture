include:
  - local: '/infra/ci/gitlab/templates/setup-env.yml'

gateway-test:
  stage: test
  extends:
    - .setup-image
  script:
    - cd $GATEWAY_DIR
    - chmod +x ./gradlew
    - ./gradlew test --build-cache --parallel

  artifacts:
    when: always
    paths:
      - /$PROJECT_DIR/build/reports/tests/test
    reports:
      junit:
        - /$PROJECT_DIR/build/test-results/test/*.xml