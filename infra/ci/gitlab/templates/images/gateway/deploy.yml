include:
  - local: '/infra/ci/gitlab/templates/setup-env.yml'

gateway-deploy:
  stage: deploy
  extends:
    - .setup-gradle
    - .setup-credentials
    - .setup-image
  needs:
    - job: gateway-publish-image
      artifacts: true
  variables:
    SERVICE_NAME: gateway

  script:
    - cd $K8S_DIR/overlays/dev-k8s/gateway

    - kustomize edit set image $SERVICE_NAME=$IMAGE_ECR_TAG

    - kubectl apply -k .