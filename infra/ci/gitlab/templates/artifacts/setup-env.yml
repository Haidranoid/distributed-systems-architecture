.setup-gradle:
  variables:
    GRADLE_OPTS: >-
      -Dorg.gradle.daemon=false
      -Dorg.gradle.parallel=true
      -Dorg.gradle.caching=true

  cache:
    paths:
      - .gradle/wrapper
      - .gradle/caches

  before_script:
    - echo "Loads environment"
    - cd infra
    - . env.sh

    - echo "Installs aws-cli"
    - apk add --no-cache aws-cli

    - echo "Authenticate aws credentials"
    - . $AWS_SCRIPTS_DIR/utils.sh
    - setup_aws_env v1

    - echo "Validate aws credentials"
    - aws configure list

    - cd ../