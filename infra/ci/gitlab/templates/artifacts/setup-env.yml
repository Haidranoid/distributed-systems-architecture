.setup-gradle:
  variables:
    GRADLE_USER_HOME: "$CI_PROJECT_DIR/services/services-starter/.gradle"
    GRADLE_OPTS: >-
      -Dorg.gradle.daemon=false
      -Dorg.gradle.parallel=true
      -Dorg.gradle.caching=true

  cache:
    paths:
      - "$CI_PROJECT_DIR/services/services-starter/.gradle/wrapper"
      - "$CI_PROJECT_DIR/services/services-starter/.gradle/caches"

  before_script:
    - cd ./services/services-starter
    - chmod +x ./gradlew