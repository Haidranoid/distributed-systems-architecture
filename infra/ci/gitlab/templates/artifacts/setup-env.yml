.setup-gradle:
  variables:
    GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
    GRADLE_OPTS: >-
      -Dorg.gradle.daemon=false
      -Dorg.gradle.parallel=true
      -Dorg.gradle.caching=true

  cache:
    paths:
      - .gradle/wrapper
      - .gradle/caches

  before_script:
    - chmod +x ./gradlew