include:
  - local: '/infra/ci/gitlab/templates/artifacts/setup-env.yml'

test:
  stage: test
  extends:
    - .setup-gradle
  image:
    name: haidranoid/gitlab-ci-java21:latest
    pull_policy: if-not-present

  script:
    - cd services/services-starter
    - chmod +x ./gradlew
    - ./gradlew test --build-cache --parallel

  artifacts:
    when: always
    paths:
      - services/services-starter/build/libs/*.jar
      - services/services-starter/build/reports/tests/test
    reports:
      junit:
        - services/services-starter/build/test-results/test/*.xml