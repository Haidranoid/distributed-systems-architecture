include:
  - local: '/infra/ci/gitlab/templates/artifacts/setup-env.yml'

test:
  extends:
    - .setup-gradle

  stage: test

  image: amazoncorretto:21-alpine3.23-jdk

  script:
    - ./gradlew test --build-cache --parallel

  artifacts:
    when: always
    paths:
      - "$CI_PROJECT_DIR/services/services-starter/build/reports/tests/test"
    reports:
      junit:
        - "$CI_PROJECT_DIR/services/services-starter/build/test-results/test/*.xml"