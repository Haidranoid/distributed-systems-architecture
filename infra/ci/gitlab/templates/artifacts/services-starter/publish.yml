include:
  - local: '/infra/ci/gitlab/templates/artifacts/setup-env.yml'

publish:
  stage: publish
  extends:
    - .setup-gradle
  needs:
    - job: test
      artifacts: true
  image:
    name: haidranoid/gitlab-ci-java21:latest
    pull_policy: if-not-present

  script:
    - cd services/services-starter
    - chmod +x ./gradlew
    - ./gradlew publish --build-cache --parallel


