include:
  - local: '/infra/ci/gitlab/templates/artifacts/setup-env.yml'

build:
  extends:
    - .setup-gradle

  stage: build

  needs:
    - test

  image: amazoncorretto:21-alpine3.23-jdk

  script:
    - ./services/services-starter/gradlew assemble -x test --build-cache --parallel

  artifacts:
    when: on_success
    paths:
      - services/services-starter/build/libs/*.jar