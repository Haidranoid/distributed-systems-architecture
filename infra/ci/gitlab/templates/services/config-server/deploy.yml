deploy:
  stage: deploy
  when: manual
  needs:
    - job: publish
      artifacts: true

  script:
    - cd $INFRA_DIR/k8s/overlays/k8s-local

    - |
      kubectl create secret docker-registry ecr-creds \
      --docker-server=$AWS_ECR_REGISTRY_URL \
      --docker-username=AWS \
      --docker-password=$AWS_ECR_AUTH_PASSWORD \
      --dry-run=client -o yaml | kubectl apply -f -

    #- kubectl kustomize . | envsubst | kubectl apply -f - -n k8s-local
    - kustomize edit set image $PROJECT_NAME=$PROJECT_IMAGE_ECR_TAG:latest

    - kubectl rollout status deployment/$PROJECT_IMAGE_ECR_TAG