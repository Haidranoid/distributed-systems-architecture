publish:
  stage: publish
  needs:
    - job: test
      artifacts: true

  script:
    - cd $PROJECT_DIR

    - echo $AWS_ECR_AUTH_PASSWORD | docker login --username AWS --password-stdin $AWS_ECR_REGISTRY_URL

    - |
      docker build \
      --push \
      --platform linux/amd64 \
      --build-arg AWS_CODEARTIFACT_AUTH_TOKEN=$AWS_CODEARTIFACT_AUTH_TOKEN \
      -t $PROJECT_IMAGE_ECR_TAG:latest \
      -t $PROJECT_IMAGE_ECR_TAG:$CI_COMMIT_SHORT_SHA \
      .
