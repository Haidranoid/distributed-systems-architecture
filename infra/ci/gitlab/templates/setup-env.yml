variables:
  PROJECT_RELATIVE_PATH_DIR: $CI_PROJECT_DIR/$PROJECT_DIR
  GRADLE_USER_HOME: /cache/gradle/$PROJECT_NAME
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.parallel=true
    -Dorg.gradle.caching=true

default:
  image:
    name: haidranoid/gitlab-ci-java21:latest
    pull_policy: if-not-present

  before_script:
    - cd $SCRIPTS_DIR
    - . env.sh

    - echo "Authenticate aws credentials"
    - setup_aws_env v1

    - cd ../../