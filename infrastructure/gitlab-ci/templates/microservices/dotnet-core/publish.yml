publish:
  stage: publish
  needs:
    - job: test
      artifacts: true

  script:
    - cd $PROJECT_DIR

    - docker_login

    - echo "$(pwd)"
    - echo "$PROJECT_NAME_SOLUTION/Dockerfile"
    - echo "$PROJECT_DIR"


    - |
      docker build \
      --push \
      --platform linux/amd64 \
      -f "$PROJECT_NAME_SOLUTION/Dockerfile" \
      -t $PROJECT_IMAGE_ECR_TAG:latest \
      .